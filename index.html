<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doujiao</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .search-btn { padding: 0.5rem 1rem; background-color: #3b82f6; color: white; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 1rem; margin-left: 0.5rem; }
    .search-btn:hover { background-color: #2563eb; }
    .disabled-input { background-color: #f9fafb; color: #9ca3af; cursor: not-allowed; }
    .disabled-btn { background-color: #d1d5db; cursor: not-allowed; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen py-12 px-4">
  <!-- 访问码模态框 (保留) -->
  <div id="accessModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
    <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4">
      <h2 id="modalTitle" class="text-xl font-bold text-gray-800 text-center mb-4 flex items-center justify-center"> 
        <span class="mr-2">🔒</span> 查看完整资源合集 
      </h2>
      <p class="text-gray-600 text-center mb-6">请前往指定位置获取今日访问码：</p>
      <a id="accessLink" href="#" target="_blank" rel="noopener noreferrer" class="w-full block text-center py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition mb-6 flex items-center justify-center"> 
        <span class="mr-2">👉</span> 点击获取 <span id="linkDate">2026-01-05</span> 访问码 
      </a>
      <div class="mb-4">
        <label class="block text-gray-700 text-sm mb-2">请输入 4 位访问码：</label>
        <input id="accessCodeInput" type="text" placeholder="例如: ab12" maxlength="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />
      </div>
      <button id="verifyBtn" class="w-full py-3 bg-green-500 hover:bg-green-600 text-white rounded-lg transition"> 验证访问码 </button>
      <p id="errorText" class="text-red-500 text-sm mt-4 text-center hidden"></p>
    </div>
  </div>

  <!-- 主容器 -->
  <div id="mainContainer" class="max-w-3xl mx-auto">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6 flex items-center justify-center"> 
      <span class="mr-2">🔍</span> Doujiao 
    </h1>
    <!-- 👋 新人必看入口 -->
    <p class="text-center mb-4">
      <a href="https://www.kdocs.cn/l/cfv01SPXoG7L" target="_blank" rel="noopener noreferrer" class="inline-block px-4 py-2 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-medium rounded-full shadow hover:shadow-md transition transform hover:-translate-y-0.5">
        👋 新人必看指南
      </a>
    </p>
    
    <!-- 类型导航 (保留) -->
    <div id="typeNav" class="text-center mt-4"></div>
    
    <!-- 搜索栏 -->
    <div class="flex flex-col md:flex-row gap-2 items-center justify-center mt-4">
      <input id="searchInput" type="text" placeholder="输入资源名称..." class="w-full md:w-96 px-4 py-3 border border-gray-300 rounded-lg shadow-sm" />
      <button class="search-btn">搜索</button>
    </div>
    
    <!-- 更新通知 (保留) -->
    <div id="updateBanner" class="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-blue-800 hidden">
      <div class="flex justify-between items-start">
        <div id="updateText" class="font-medium space-y-1 text-sm"></div>
        <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="text-blue-600 hover:text-blue-800 ml-2">×</button>
      </div>
    </div>
    
    <div id="loading" class="text-center text-gray-500 mt-6 hidden">正在加载资源库...</div>
    <div id="results" class="mt-6 space-y-4"></div>
    <div id="noResults" class="text-center text-gray-500 mt-8 hidden">未找到相关资源 😢</div>
  </div>

  <!-- 清单视图 -->
  <div id="listView" class="max-w-4xl mx-auto hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 id="listTitle" class="text-2xl font-bold text-gray-800"></h2>
      <button id="backBtn" class="text-blue-500 hover:underline">← 返回</button>
    </div>
    <div id="groupedList" class="space-y-6"></div>
    <div id="listPagination" class="mt-8 flex justify-center space-x-2"></div>
  </div>

  <script>
    // === 配置 (保留原样) ===
    const STOP_WORDS = ['小说', '漫画'];
    
    // 1. 定义资源字段和提取码字段
    // 注意：原代码只有 kk, bd, uc, xl，我根据你的要求增加了 yd (移动) 和 lz (蓝奏)
    const RESOURCE_FIELDS = ['kk', 'bd', 'uc', 'xl', 'yd', 'lz']; 
    const CODE_FIELDS = ['kkm', 'bdm', 'ucm', 'xlm', 'ydm']; // 对应的提取码字段

    const ACCESS_MAP = {
      '2026-05-15': { link: 'https://pan.quark.cn/s/c68f0132a97b', code: '8532' },
      '2026-01-06': { link: 'https://pan.quark.cn/s/fbabd589546a', code: '1470' },
      '2026-01-07': { link: 'https://pan.quark.cn/s/1a2c9a75ca2d', code: '7231' },
      '2026-01-08': { link: 'https://pan.quark.cn/s/aa0b8d53620a', code: '2048' },
      '2026-01-09': { link: 'https://pan.quark.cn/s/2da4c170bede', code: '3388' },
      '2026-01-10': { link: 'https://pan.quark.cn/s/ffd272d299ea', code: '7478' },
      '2026-01-11': { link: 'https://pan.quark.cn/s/b6c0fc9d4187', code: '1574' },
      '2026-01-12': { link: 'https://pan.quark.cn/s/031a59f2e250', code: '7865' },
      '2026-01-13': { link: 'https://pan.quark.cn/s/5455ceee2f80', code: '6855' },
      '2026-01-14': { link: 'https://pan.quark.cn/s/412ae569c058', code: '3567' },
      '2026-01-15': { link: 'https://pan.quark.cn/s/7ca20e801c9d', code: '3385' },
      '2026-01-16': { link: 'https://pan.quark.cn/s/9fe9a95bc5f2', code: '1727' },
      '2026-01-17': { link: 'https://pan.quark.cn/s/bb6cd1e53d5b', code: '6721' },
      '2026-01-18': { link: 'https://pan.quark.cn/s/5f17a9a642fb', code: '2824' },
      '2026-01-19': { link: 'https://pan.quark.cn/s/61cf986dfc4b', code: '6344' },
      '2026-01-20': { link: 'https://pan.quark.cn/s/8b0f23aba29c', code: '8340' },
      '2026-01-21': { link: 'https://pan.quark.cn/s/d38ad59e59dd', code: '5558' },
      '2026-01-22': { link: 'https://pan.quark.cn/s/ebfe6725e44b', code: '1637' },
      '2026-01-23': { link: 'https://pan.quark.cn/s/707e11322f75', code: '8600' },
      '2026-01-24': { link: 'https://pan.quark.cn/s/219e178ada01', code: '3876' },
      '2026-01-25': { link: 'https://pan.quark.cn/s/7ee5a0d569f3', code: '3234' },
      '2026-01-26': { link: 'https://pan.quark.cn/s/56f2d33a9d79', code: '5207' }
    };

    // DOM 元素 (保留)
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.querySelector('.search-btn');
    const loadingDiv = document.getElementById('loading');
    const resultsDiv = document.getElementById('results');
    const noResultsDiv = document.getElementById('noResults');
    const mainContainer = document.getElementById('mainContainer');
    const listView = document.getElementById('listView');
    const typeNav = document.getElementById('typeNav');
    const accessModal = document.getElementById('accessModal');

    let resources = [];
    let currentListType = null;
    const ITEMS_PER_PAGE = 20;

    // --- 核心逻辑：获取随机网盘链接 (完全重写此函数) ---
    function getRandomValidLinks(item, maxCount = 3) {
      // 1. 收集所有有效的资源链接
      let validResources = [];
      RESOURCE_FIELDS.forEach(field => {
        const url = item[field];
        if (url && typeof url === 'string' && url.trim() !== '' && url.startsWith('http')) {
          validResources.push({ field, url: url.trim() });
        }
      });

      // 2. 如果没有资源，返回空数组
      if (validResources.length === 0) return [];

      // 3. 随机打乱并取第一个作为主链接
      const shuffled = validResources.sort(() => 0.5 - Math.random());
      const primary = shuffled[0];
      
      // 4. 准备返回结果
      let result = [];

      // 5. 处理蓝奏网盘 (lz) 的特殊情况
      if (primary.field === 'lz') {
        // 如果是蓝奏，只显示一个“蓝奏网盘”链接
        result.push({
          url: primary.url,
          text: "蓝奏网盘",
          class: "bg-blue-400"
        });

        // 查找对应的提取码链接
        let validCodes = [];
        CODE_FIELDS.forEach(field => {
          const codeUrl = item[field];
          if (codeUrl && typeof codeUrl === 'string' && codeUrl.trim() !== '' && codeUrl.startsWith('http')) {
            validCodes.push(codeUrl.trim());
          }
        });

        // 如果有提取码链接，随机选一个加入结果
        if (validCodes.length > 0) {
          const randomCodeIndex = Math.floor(Math.random() * validCodes.length);
          result.push({
            url: validCodes[randomCodeIndex],
            text: "🔑 获取提取码",
            class: "bg-gray-200 text-gray-700"
          });
        }
      } else {
        // 6. 处理普通网盘 (非蓝奏)
        // 确定按钮样式
        let btnClass = "bg-blue-500";
        let btnText = "下载链接";
        
        if (primary.field === 'kk') { btnClass = "bg-yellow-500 text-black"; btnText = "夸克网盘"; }
        else if (primary.field === 'bd') { btnClass = "bg-cyan-600"; btnText = "百度网盘"; }
        else if (primary.field === 'uc') { btnClass = "bg-orange-500"; btnText = "UC网盘"; }
        else if (primary.field === 'xl') { btnClass = "bg-green-500"; btnText = "迅雷云盘"; }
        else if (primary.field === 'yd') { btnClass = "bg-pink-500"; btnText = "移动网盘"; }

        result.push({
          url: primary.url,
          text: btnText,
          class: btnClass
        });
      }

      return result;
    }

    // --- 辅助函数 (保留) ---
    function cleanQuery(query) {
      let cleaned = query;
      STOP_WORDS.forEach(word => {
        const regex = new RegExp(word, 'g');
        cleaned = cleaned.replace(regex, '');
      });
      return cleaned.trim();
    }

    function getBeijingDate() {
      const now = new Date();
      const utc = now.getTime() + now.getTimezoneOffset() * 60000;
      const beijingTime = new Date(utc + 8 * 3600000);
      return beijingTime.toLocaleDateString('sv');
    }

    // --- 渲染函数 (修改调用逻辑) ---
    function renderListPage(page) {
      const items = resources.filter(item => item.type === currentListType);
      const groups = {};
      items.forEach(item => {
        const initial = (item.initial || '#').toUpperCase();
        if (!groups[initial]) groups[initial] = [];
        groups[initial].push(item);
      });
      
      const sortedInitials = Object.keys(groups).sort();
      const allEntries = [];
      sortedInitials.forEach(initial => {
        allEntries.push({ type: 'header', initial });
        groups[initial].forEach(item => allEntries.push({ type: 'item', data: item }));
      });

      const totalPages = Math.ceil(allEntries.length / ITEMS_PER_PAGE);
      const start = (page - 1) * ITEMS_PER_PAGE;
      const pageEntries = allEntries.slice(start, start + ITEMS_PER_PAGE);

      let html = '';
      pageEntries.forEach(entry => {
        if (entry.type === 'header') {
          html += `<h3 class="text-xl font-bold text-gray-700 border-l-4 border-blue-500 pl-2 mt-4">${entry.initial}</h3>`;
        } else {
          const item = entry.data;
          const links = getRandomValidLinks(item, 3); // 使用新逻辑
          html += `<div class="bg-white p-4 rounded-lg shadow"> 
                     <h4 class="font-semibold text-blue-600">${item.title}</h4>`;
          
          if (links.length > 0) {
            links.forEach((link, idx) => {
              // 应用 Tailwind 样式
              const tailwindClasses = `block mt-2 px-4 py-2 text-white font-medium rounded transition text-center hover:opacity-90 ${link.class}`;
              html += `<a href="${link.url}" target="_blank" class="${tailwindClasses}">${link.text}</a>`;
            });
          } else {
            html += `<p class="text-gray-500 mt-2">暂无有效链接</p>`;
          }
          
          html += `</div>`;
        }
      });

      document.getElementById('groupedList').innerHTML = html || '<p class="text-center text-gray-500">暂无资源</p>';
      renderPagination(page, totalPages);
    }

    // --- 搜索渲染 (修改调用逻辑) ---
    function performActualSearch(rawQuery) {
      if (!resources || !rawQuery.trim()) {
        resultsDiv.innerHTML = '';
        noResultsDiv.classList.add('hidden');
        return;
      }
      const query = cleanQuery(rawQuery);
      if (!query) {
        resultsDiv.innerHTML = '<p class="text-gray-500 text-center">请输入有效关键词</p>';
        noResultsDiv.classList.add('hidden');
        return;
      }
      
      const hits = resources.filter(item => {
        const title = (item.title || '').toLowerCase().replace(/[\s\u2000-\u206F]/g, '');
        const q = query.toLowerCase().replace(/[\s\u2000-\u206F]/g, '');
        return title.includes(q);
      });

      resultsDiv.innerHTML = '';
      noResultsDiv.classList.toggle('hidden', hits.length > 0);
      
      if (hits.length === 0) {
        noResultsDiv.classList.remove('hidden');
      } else {
        hits.forEach(item => {
          const links = getRandomValidLinks(item, 3); // 使用新逻辑
          let html = `<div class="bg-white p-5 rounded-xl shadow hover:shadow-md transition"> 
                        <h2 class="text-xl font-semibold text-blue-600">${item.title}</h2>`;
          
          if (links.length > 0) {
            links.forEach((link, idx) => {
              const tailwindClasses = `block mt-2 px-4 py-2 text-white font-medium rounded transition text-center hover:opacity-90 ${link.class}`;
              html += `<a href="${link.url}" target="_blank" class="${tailwindClasses}">${link.text}</
