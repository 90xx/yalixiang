  <script>
    // === 配置 ===
    const STOP_WORDS = ['小说', '漫画'];
    // 定义所有网盘字段
    const NET_DISK_FIELDS = ['kk', 'bd', 'uc', 'xl', 'yd', 'lz'];
    // 定义所有提取码字段（实际是分享页链接）
    const CODE_FIELDS = ['kkm', 'bdm', 'ucm', 'xlm', 'ydm'];

    // 网盘字段 → 中文名映射
    const NET_DISK_NAMES = {
      'kk': '夸克',
      'bd': '百度',
      'uc': 'UC',
      'xl': '迅雷',
      'yd': '移动',
      'lz': '蓝奏'
    };

    const ACCESS_MAP = {
  '2026-05-20': { link: 'https://pan.quark.cn/s/d30852a08eff', code: 'bird' },
  '2026-05-21': { link: 'https://pan.quark.cn/s/6d988f15a4ce', code: 'cake' },
  '2026-05-22': { link: 'https://pan.quark.cn/s/453aff236542', code: 'desk' },
  '2026-05-23': { link: 'https://pan.quark.cn/s/bfac19f03767', code: 'fish' },
  '2026-05-24': { link: 'https://pan.quark.cn/s/bcbfec0eb69b', code: 'game' },
  '2026-05-25': { link: 'https://pan.quark.cn/s/1007a6691c4b', code: 'hand' },
  '2026-05-26': { link: 'https://pan.quark.cn/s/a9996bc1030f', code: 'jump' },
  '2026-05-27': { link: 'https://pan.quark.cn/s/cec97ec3f1d0', code: 'kite' },
  '2026-05-28': { link: 'https://pan.quark.cn/s/9b8502bf8c6a', code: 'lamp' },
  '2026-05-29': { link: 'https://pan.quark.cn/s/129e6dd9479f', code: 'moon' },
  '2026-05-30': { link: 'https://pan.quark.cn/s/0c75af9b394b', code: 'nest' },
  '2026-05-31': { link: 'https://pan.quark.cn/s/ac2be3c7fbe9', code: 'open' },
  '2026-06-01': { link: 'https://pan.quark.cn/s/b6965220c8d9', code: 'park' },
  '2026-06-02': { link: 'https://pan.quark.cn/s/ddb59d52955d', code: 'queen' },
  '2026-06-03': { link: 'https://pan.quark.cn/s/436bd0ceba2b', code: 'rain' },
  '2026-06-04': { link: 'https://pan.quark.cn/s/88e327ea396c', code: 'star' },
  '2026-06-05': { link: 'https://pan.quark.cn/s/9c0549dfd5a1', code: 'tree' },
  '2026-06-06': { link: 'https://pan.quark.cn/s/ae89882d662b', code: 'umbrella' },
  '2026-06-07': { link: 'https://pan.quark.cn/s/167faa36f2ab', code: 'vest' },
  '2026-06-08': { link: 'https://pan.quark.cn/s/f4b191c14b1a', code: 'wolf' },
  '2026-06-09': { link: 'https://pan.quark.cn/s/22a965389307', code: 'yarn' },
  '2026-06-10': { link: 'https://pan.quark.cn/s/d1e6ef4cbdae', code: 'zero' },
  '2026-06-11': { link: 'https://pan.quark.cn/s/40c8a04a61da', code: 'blue' },
  '2026-06-12': { link: 'https://pan.quark.cn/s/5f38d86ebf6e', code: 'cold' },
  '2026-06-13': { link: 'https://pan.quark.cn/s/9e3abc53d119', code: 'door' },
  '2026-06-14': { link: 'https://pan.quark.cn/s/e5bffcf93999', code: 'egg' },
  '2026-06-15': { link: 'https://pan.quark.cn/s/ab676418abd0', code: 'face' },
  '2026-06-16': { link: 'https://pan.quark.cn/s/9c4b6582b5f9', code: 'good' },
  '2026-06-17': { link: 'https://pan.quark.cn/s/e7b8ee3defde', code: 'hair' },
  '2026-06-18': { link: 'https://pan.quark.cn/s/cbcd05173586', code: 'idea' }
}

    // DOM
    const loadingDiv = document.getElementById('loading');
    const resultsDiv = document.getElementById('results');
    const noResultsDiv = document.getElementById('noResults');
    const mainContainer = document.getElementById('mainContainer');
    const listView = document.getElementById('listView');
    const typeNav = document.getElementById('typeNav');
    const accessModal = document.getElementById('accessModal');
    const navSection = document.getElementById('navSection');
    const overlay = document.getElementById('overlay');

    // 新增：清单页的搜索框和按钮
    const listSearchInput = document.getElementById('listSearchInput');
    const listSearchBtn = document.getElementById('listSearchBtn');

    let resources = [];
    let currentListType = null;
    const ITEMS_PER_PAGE = 20;
    let isVerified = false; // 全局验证状态标志

    // 检查是否已通过今日验证
    function checkVerificationStatus() {
      const today = getBeijingDate();
      const lastVerified = localStorage.getItem('lastVerifiedDate');
      return lastVerified === today;
    }

    // 设置今日已验证状态
    function setVerificationStatus() {
      const today = getBeijingDate();
      localStorage.setItem('lastVerifiedDate', today);
    }

    // 获取北京时间的函数
    function getBeijingDate() {
      const now = new Date();
      const utc = now.getTime() + now.getTimezoneOffset() * 60000;
      const beijingTime = new Date(utc + 8 * 3600000);
      return beijingTime.toLocaleDateString('sv');
    }

    // 显示遮罩层，禁用交互
    function showOverlay() {
        overlay.classList.remove('hidden');
        // 禁用分类按钮的点击事件
        typeNav.querySelectorAll('button').forEach(btn => {
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.6';
        });
        // 禁用导航链接的点击事件
        navSection.querySelectorAll('a').forEach(link => {
            link.style.pointerEvents = 'none';
            link.style.opacity = '0.6';
        });
    }

    // 隐藏遮罩层，启用交互
    function hideOverlay() {
        overlay.classList.add('hidden');
        // 启用分类按钮的点击事件
        typeNav.querySelectorAll('button').forEach(btn => {
            btn.style.pointerEvents = 'auto';
            btn.style.opacity = '1';
        });
        // 启用导航链接的点击事件
        navSection.querySelectorAll('a').forEach(link => {
            link.style.pointerEvents = 'auto';
            link.style.opacity = '1';
        });
    }

    // 初始化页面：检查验证状态
    function initPage() {
        if (checkVerificationStatus()) {
            // 如果已验证
            isVerified = true;
            accessModal.style.display = 'none';
            hideOverlay(); // 隐藏遮罩，启用功能
            // 然后加载数据
            loadData();
        } else {
            // 如果未验证
            isVerified = false;
            accessModal.style.display = 'flex';
            showOverlay(); // 显示遮罩，禁用功能
            // 更新模态框中的日期和链接
            updateAccessInfo();
        }
    }

    // 更新模态框中的日期和链接
    function updateAccessInfo() {
        const today = getBeijingDate();
        const record = ACCESS_MAP[today];
        
        if (record) {
            document.getElementById('linkDate').textContent = today;
            document.getElementById('accessLink').href = record.link;
        } else {
            document.getElementById('linkDate').textContent = today;
            document.getElementById('accessLink').href = '#';
            console.warn(`未配置 ${today} 的访问码和链接。`);
        }
    }

    // 验证访问码
    document.getElementById('verifyBtn').addEventListener('click', () => {
      const input = document.getElementById('accessCodeInput').value.trim();
      const today = getBeijingDate();
      const record = ACCESS_MAP[today];
      const errorText = document.getElementById('errorText');

      if (!record) {
        errorText.textContent = `系统错误：未配置 ${today} 的访问码。`;
        errorText.classList.remove('hidden');
        return;
      }

      if (input === record.code) {
        setVerificationStatus(); // 记录验证状态
        isVerified = true; // 更新全局状态
        accessModal.style.display = 'none'; // 关闭模态框
        hideOverlay(); // 隐藏遮罩
        document.getElementById('accessCodeInput').value = ''; // 清空输入框
        errorText.classList.add('hidden'); // 隐藏错误信息

        // 验证成功后开始加载数据
        loadData();
      } else {
        errorText.textContent = '访问码错误，请重新输入。';
        errorText.classList.remove('hidden');
      }
    });

    // 允许在输入框按回车键验证
    document.getElementById('accessCodeInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            document.getElementById('verifyBtn').click();
        }
    });

    // 🔥 修改：getRandomValidLinks 函数
    function getRandomValidLinks(item) {
      const validDisks = NET_DISK_FIELDS
        .filter(field => item[field] && typeof item[field] === 'string' && item[field].trim() !== '' && item[field].startsWith('http'))
        .map(field => ({
          type: field === 'lz' ? 'lz' : 'normal',
          field,
          name: NET_DISK_NAMES[field] || field.toUpperCase(),
          url: item[field]
        }));

      if (validDisks.length === 0) return [];

      const randomIndex = Math.floor(Math.random() * validDisks.length);
      const selected = validDisks[randomIndex];

      // 如果是 lz，收集所有有效的分享页链接
      let codeUrl = null;
      if (selected.type === 'lz') {
        const validSharePages = CODE_FIELDS
          .filter(field => item[field] && typeof item[field] === 'string' && item[field].trim() !== '' && item[field].startsWith('http'))
          .map(field => item[field]);

        if (validSharePages.length > 0) {
          // 随机选一个分享页链接
          const randomShareIndex = Math.floor(Math.random() * validSharePages.length);
          codeUrl = validSharePages[randomShareIndex]; // 🔥 将分享页链接存储为 codeUrl
        }
      }

      return [{
        mainType: selected.type,
        mainText: selected.name,
        mainUrl: selected.url,
        hasLz: !!item.lz && typeof item.lz === 'string' && item.lz.trim() !== '' && item.lz.startsWith('http'),
        codeUrl: codeUrl // 🔥 添加 codeUrl 字段
      }];
    }

    function cleanQuery(query) {
      let cleaned = query;
      STOP_WORDS.forEach(word => {
        const regex = new RegExp(word, 'g');
        cleaned = cleaned.replace(regex, '');
      });
      return cleaned.trim();
    }

    async function loadData() {
      if (resources.length > 0) return;
      loadingDiv.classList.remove('hidden');

      const dataFiles = [
       './hfmyd.json'
      ];

      try {
        const responses = await Promise.all(
          dataFiles.map(url => fetch(url + '?t=' + Date.now()))
        );

        for (const res of responses) {
          if (!res.ok) throw new Error(`加载失败: ${res.url}`);
        }

        const allData = await Promise.all(responses.map(res => res.json()));

        resources = [];
        for (const data of allData) {
          if (Array.isArray(data)) {
            resources.push(...data);
          } else if (Array.isArray(data.items)) {
            resources.push(...data.items);
          }
        }

        loadingDiv.classList.add('hidden');
        renderTypeNav();
      } catch (err) {
        console.error('加载多数据源失败:', err);
        loadingDiv.innerHTML = `<p class="text-red-500 text-center">❌ 加载资源失败：${err.message || '未知错误'}</p>`;
      }
    }

    function renderTypeNav() {
      const types = [...new Set(resources.map(item => item.type).filter(t => t))];
      typeNav.innerHTML = '';
      if (types.length === 0) return;

      let html = '<div class="flex flex-wrap justify-center gap-2">';
      types.forEach(type => {
        html += `
          <button data-type="${type}"
                  class="px-4 py-2 bg-indigo-100 hover:bg-indigo-200 text-indigo-700 rounded-lg transition">
             ${type}
          </button>`;
      });
      html += '</div>';
      typeNav.innerHTML = html;

      // 为分类按钮添加点击事件监听器
      typeNav.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!isVerified) {
            // 如果未验证，点击无效
            return;
          }
          const type = btn.dataset.type;
          showListView(type);
        });
      });
    }

    function showListView(type) {
      currentListType = type;
      document.getElementById('listTitle').textContent = `${type}清单`;
      mainContainer.classList.add('hidden');
      navSection.classList.add('hidden');
      listView.classList.remove('hidden');

      // ✅ 绑定清单页搜索事件
      listSearchBtn.removeEventListener('click', handleListSearch); // 防止重复绑定
      listSearchBtn.addEventListener('click', handleListSearch);
      listSearchInput.removeEventListener('keypress', handleListSearchOnEnter); // 防止重复绑定
      listSearchInput.addEventListener('keypress', handleListSearchOnEnter);

      renderListPage(1);
    }

    // ✅ 清单页内搜索函数
    function handleListSearch() {
        if (!isVerified) return;
        const rawQuery = listSearchInput.value.trim();
        if (!rawQuery) {
            // 如果清空搜索框，则恢复显示当前分类的所有内容
            renderListPage(1);
            return;
        }
        const query = cleanQuery(rawQuery);
        if (!query) {
            listSearchInput.value = '';
            renderListPage(1);
            return;
        }

        const items = resources.filter(item => item.type === currentListType);
        const hits = items.filter(item => {
            const title = (item.title || '').toLowerCase().replace(/[\s\u2000-\u206F]/g, '');
            const q = query.toLowerCase().replace(/[\s\u2000-\u206F]/g, '');
            return title.includes(q);
        });

        // 构建分组数据
        const groups = {};
        hits.forEach(item => {
            const initial = (item.initial || '#').toUpperCase();
            if (!groups[initial]) groups[initial] = [];
            groups[initial].push(item);
        });

        const sortedInitials = Object.keys(groups).sort();
        const allEntries = [];
        sortedInitials.forEach(initial => {
            allEntries.push({ type: 'header', initial });
            groups[initial].forEach(item => allEntries.push({ type: 'item', data: item }));
        });

        // 渲染结果
        renderGroupedEntries(allEntries);
        // 搜索结果不显示分页
        document.getElementById('listPagination').classList.add('hidden');
    }

    // ✅ 清单页内搜索回车事件
    function handleListSearchOnEnter(e) {
        if (e.key === 'Enter') {
            handleListSearch();
        }
    }

    // ✅ 渲染分组条目（用于搜索和分页）
    function renderGroupedEntries(entries) {
        let html = '';
        entries.forEach(entry => {
            if (entry.type === 'header') {
                html += `<h3 class="text-xl font-bold text-gray-700 border-l-4 border-blue-500 pl-2">${entry.initial}</h3>`;
            } else {
                const item = entry.data;
                const links = getRandomValidLinks(item);

                html += `<div class="bg-white p-4 rounded-lg shadow">
                    <h4 class="font-semibold text-blue-600">${item.title}</h4>`;

                if (links.length > 0) {
                    const link = links[0];
                    html += `<a href="${link.mainUrl}" target="_blank" class="block mt-1 text-green-600">${link.mainText}</a>`;
                    // 🔥 修改：蓝奏云链接显示方式
                    if (link.hasLz && link.mainType === 'lz' && link.codeUrl) {
                        // 直接渲染一个链接到分享页的“提取码”文字
                        html += `<a href="${link.codeUrl}" target="_blank" class="block mt-1 text-green-600">提取码</a>`;
                    }
                } else {
                    html += `<p class="text-gray-500 mt-1">暂无有效链接</p>`;
                }

                html += `</div>`;
            }
        });

        document.getElementById('groupedList').innerHTML = html || '<p class="text-center text-gray-500">未找到相关资源</p>';
    }


    function renderListPage(page) {
      const items = resources.filter(item => item.type === currentListType);
      const groups = {};

      items.forEach(item => {
        const initial = (item.initial || '#').toUpperCase();
        if (!groups[initial]) groups[initial] = [];
        groups[initial].push(item);
      });

      const sortedInitials = Object.keys(groups).sort();
      const allEntries = [];
      sortedInitials.forEach(initial => {
        allEntries.push({ type: 'header', initial });
        groups[initial].forEach(item => allEntries.push({ type: 'item', data: item }));
      });

      const totalPages = Math.ceil(allEntries.length / ITEMS_PER_PAGE);
      const start = (page - 1) * ITEMS_PER_PAGE;
      const pageEntries = allEntries.slice(start, start + ITEMS_PER_PAGE);

      renderGroupedEntries(pageEntries);
      renderPagination(page, totalPages);
    }

    function renderPagination(current, total) {
      const div = document.getElementById('listPagination');
      if (total <= 1) {
        div.classList.add('hidden');
        return;
      }
      div.classList.remove('hidden');

      let html = '';
      const max = 5;
      let start = Math.max(1, current - Math.floor(max / 2));
      let end = Math.min(total, start + max - 1);
      if (end - start + 1 < max) start = Math.max(1, end - max + 1);

      if (current > 1) html += `<button data-page="${current - 1}" class="px-3 py-1 border rounded">❮</button>`;
      for (let i = start; i <= end; i++) {
        html += i === current
          ? `<span class="px-3 py-1 bg-blue-500 text-white rounded">${i}</span>`
          : `<button data-page="${i}" class="px-3 py-1 border rounded">${i}</button>`;
      }
      if (current < total) html += `<button data-page="${current + 1}" class="px-3 py-1 border rounded">❯</button>`;

      div.innerHTML = html;
      div.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!isVerified) return; // 确保分页按钮也受验证保护
          renderListPage(parseInt(btn.dataset.page));
        });
      });
    }

    document.getElementById('backBtn').addEventListener('click', () => {
      listView.classList.add('hidden');
      mainContainer.classList.remove('hidden');
      navSection.classList.remove('hidden');
      if (!isVerified) {
        // 如果返回时仍未验证，重新显示遮罩
        showOverlay();
      }
      // ✅ 返回时清空搜索框
      listSearchInput.value = '';
    });

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', () => {
        initPage();
    });

  </script>
</body>
</html>
